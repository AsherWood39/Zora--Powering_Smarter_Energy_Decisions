<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zora | Intelligent Battery Analytics</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <span class="material-icons-round logo-icon">bolt</span>
                <h1>Zora</h1>
            </div>
            <nav>
                <a href="#" class="active">
                    <span class="material-icons-round">dashboard</span>
                    Dashboard
                </a>
                <a href="#">
                    <span class="material-icons-round">analytics</span>
                    Analytics
                </a>
                <a href="#">
                    <span class="material-icons-round">directions_car</span>
                    Fleet
                </a>
                <a href="#">
                    <span class="material-icons-round">settings</span>
                    Settings
                </a>
            </nav>
            <div class="user-profile">
                <div class="avatar">JM</div>
                <div class="info">
                    <p>John Musk</p>
                    <span>Fleet Manager</span>
                </div>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-bar">
                <div class="breadcrumbs">
                    <span>Dashboards</span> / <span class="current">Battery Health Overview</span>
                </div>
                <div class="actions">
                    <button class="icon-btn"><span class="material-icons-round">notifications</span></button>
                    <button class="primary-btn">Export Report</button>
                </div>
            </header>
            
            <div class="content-wrapper">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
